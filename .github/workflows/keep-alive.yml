name: Keep Alive

# Pings the app so the Fly machine (auto_stop_machines = 'suspend',
# min_machines_running = 0) stays warm and the first real visit doesn't pay a
# cold-start (~5s white screen). Repo is public → GitHub Actions minutes are free.
#
# GitHub's minimum cron interval is 5 minutes and scheduled runs can be delayed,
# so each run pings every ~60s for ~5 minutes to bridge the gaps and keep the
# machine from idling long enough to suspend.

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

concurrency:
  group: keep-alive
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Ping to keep the Fly machine warm
        run: |
          URL="https://mymirror.myinterdesk.net/gitstamp.txt"
          for i in $(seq 1 5); do
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 30 "$URL" || echo "000")
            echo "ping $i -> HTTP $code"
            if [ "$i" -lt 5 ]; then sleep 60; fi
          done
